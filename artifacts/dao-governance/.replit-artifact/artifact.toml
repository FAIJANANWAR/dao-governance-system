kind = "web"
previewPath = "/"
title = "DAO Governance System"
version = "1.0.0"
id = "artifacts/dao-governance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22415

[services.development]
run = "pnpm --filter @workspace/dao-governance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dao-governance", "run", "build" ]
publicDir = "artifacts/dao-governance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22415"
BASE_PATH = "/"
